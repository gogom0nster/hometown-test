<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고향</title>

<style>

body {
  margin: 0;
  padding: 0;
  font-family: monospace;
  background: #fff;

  display: flex;
  flex-direction: column;
  align-items: center;

  min-height: 100vh;
}

/* 왼쪽 상단 메뉴 */
#menu {
  position: fixed;
  top: 18px;
  left: 18px;
  font-size: 14px;
}

#menu span {
  cursor: pointer;
  margin-right: 10px;
  color: #000;
}

#menu span:hover {
  color: #333;
}

/* 내용 영역 */
#content {
  margin-top: 70px;

  width: 92%;
  max-width: 700px;

  min-height: 300px;

  border: 1px solid #ccc;

  padding: 22px;

  line-height: 1.65;

  white-space: pre-wrap;

  box-sizing: border-box;
}

</style>
</head>

<body>

<!-- 메뉴 -->
<div id="menu">
  <span data-step="1">1</span> / 
  <span data-step="2">2</span> / 
  <span data-step="3">3</span>
</div>

<!-- 단계별 내용 영역 -->
<div id="content">
  <p></p>
</div>

<script>

// 단계별 일기 내용
const diaryContents = {
  1: ` 아버지는 마당의 살구나무를 팔면서 무슨 생각을 했을까? 저축을 해 은행 이자를 다달이 받을까, 단타 기법 주식 뉴스를 보면서 투자를 할까, 딸의 대학 등록금, 손녀의 기저귀 값, 농기구를 살 자금··. 나무는 흰 꽃이 참 예뻤고, 열매도 달콤했다. 8.5톤 카고 트럭에 뿌리째 누워있는 살구나무는 어쩐지 생기를 잃은 것 같다. 나는 비가 오는 날, 아무도 없는 집에서 학교에 간 언니들과 과수원에 간 부모님을 기다리며 나무 앞에 가만히 서 있었다. 우리는 비를 맞으며 오래 이야기 했다. 분명 무슨 말을 했는데, 그러나 지금 떠오르는 것은                  뿐이다.

 어쩌면 나무는 이름 모를 부잣집 정원에 심어졌을지도 모른다. 지금의 나는 기차에 올라 오피스텔에 도착한다. 그곳에서 월세를 내고, 공부를 하고 있다. 어쩐지 생기를 잃은 것 같지만, 부자들의 도시에서 학교를 다니고 돈을 벌다 보면 어른이 될 거라는 막연한 믿음 뿐이다. 나무를 판 아버지의 선택을 이해하지 못하는 게 아니다. 나무가 부자의 정원으로 갔을지, 혹시 그가 변태 성욕자는 아닐지, 말을 걸어 줄 사람은 있을지가 걱정되는 것뿐이다.

 나는 잠을 잔다. 옆집에 무시무시한 범죄자가, 시골의 초등학교 동창이 살고 있을지도 모를 건물에서 잠을 잔다. 아버지는 내가 서울에서 어른이 될 것이라 믿을 게 분명하다. 나는 언젠가 어느 부자의 회사에 취직해 성실한 어른이 되겠지. 어떤 색의 꽃을 피웠는지, 어떤 맛의 열매가 맺혔는지는 기억 속에 잠길 것이다. 같이 비를 맞으며 나눈 대화를 잊어버린 것처럼 말이다. 나무는 보란 듯이 부자의 정원에서 고급 수액을 맞고 훌륭한 꽃을 피워냈을지도 모른다.

 그러나 나무가 무슨 마음일지는 정말로 알 수가 없다. 나는 조금 쓸쓸한 마음이다.`,
  2: `고향으로 돌아가는 꿈이다.

어느 여름날, 해는 중천에 떠 있다. 아빠가 시장에서 데려온 강아지들이랑 마당을 뒹군다. 그렇게 행복할 수 없다.
매가 강아지 물어 갈지도 몰라. 그러니까 강아지 잘 보고 있어라.
꾸물대는 흰 덩어리들을 껴안고 하늘을 주시한다. 발밑에서 풀들이 돋아난다. 강아지들이 흐물흐물 품속에서 녹아내리고, 나는 금세 맨발이 된다.

다시 하늘을 바라본다. 어느새 마당은 과수원으로 변해 있다. 커다란 새가 해를 반으로 가르며 날아간다. 사위가 어둑어둑하다. 발바닥에 닿는 거센 풀들의 감촉은 떨치려 하면 할수록 더욱 세게 달라붙는다.
나는 발을 옭아매는 풀을 뒤로한 채 뛰기 시작한다. 앞만 보며 계속해 뛴다. 갈라진 해는 자신의 역할을 하지 못하고, 주위는 여전히 어둑어둑하다.
한참을 뛰었을까, 또다시 마을이다.

아무도 없는 마을이다. 모두 어디로 사라진 걸까? 나는 어디로 가는 걸까? 숲에 잡아먹힐 것만 같다. 어디선가 내려온 넝쿨이 이마를 툭, 툭, 툭 건드린다. 뜀박질을 멈추고 고개를 돌렸을 땐,

커다랗고 뒤집힌 머리와 마주한다. 팔도 다리도 발도 손도 없는 머리.
나는 머리가 왜 꿈에 나왔는지, 내가 무엇을 두려워하고 있는 건지를 생각한다. 생각하다 보면 당황스럽고 무서운 마음이 드는데···. 순간 머리가 쿵, 쿵, 쿵 앞으로 다가오더니 커다랗게 입을 벌리곤, 나를 집어삼킨다.

눈을 뜨니 천장이다.

새벽 어스름 진 침실에 누운 나의 몸이 보인다. 시야만 겨우 움직여지고, 몸은 꼼짝할 수 없다.
내 몸이 있는 곳이 어디인지 헷갈린다. 할머니가 사 온 파란 꽃무늬 커튼 속? 교복이 놓인 의자 위? 코를 고는 룸메이트 옆? 달리는 기차 안?

내 마음이 어디에 있는지 역시 모르겠다.`, 

  3: ` M에게 고향과 노스탤지어를 사유한 이미지를 만들어달라고 요청했다. M은 시골의 가을날 풍경을 만들었다. 사람들이 입력한 데이터에서 고향이란, 이런 풍경이구나. 어쩌면 우리 마음 속 고향의 원형이란 이런 것일지도 모르겠다. 반복해서 같은 요청을 하자 M은 입력된 데이터를 뒤지며 더 많은 이미지를 만들어냈다. 아파트가 세워진 도시의 풍경이었다. M의 순수한 접근은 쓸쓸한 것이었다. 

 앞으로도 M은 사람들이 가장 많이 입력한 데이터를 토대로 보편적인 노스탤지어를 그려낼 것이다. 고향을 떠나는 기차를 타고 서울에 도착할 때, 쏟아지는 인파를 보면 그 흐름을 어렴풋이 알 것만 같다. 저마다의 이야기를 담은 가방을 맨 사람들이 나와 다르지 않게 느껴졌다. 몇 명의 사람이 이곳에 남을까? 혹은 되돌아갈까? 

 M이 그려낸 피상적인 이미지들은 결코 그 이야기들을 담아낼 수는 없을 것이다. 하지만 나는 M의 작품들을 보면서 분명 내가 가본 적 없을 허구의 장소이건만 종잡을 수 없는 그리움을 느낀다. 이상하면서도 슬픈 일이다. 끝내 데이터 창고 저 아래에 남을 풍경들의 소멸을 떠올리며, 이 끝없는 질주가 무슨 풍경을 남길지 공허했다.`
};

// 메뉴 클릭 이벤트
const menuSpans = document.querySelectorAll("#menu span");
const contentDiv = document.getElementById("content");

menuSpans.forEach(span => {
  span.addEventListener("click", () => {
    const step = span.getAttribute("data-step");
    contentDiv.textContent = diaryContents[step] || "내용 없음";
  });
});

// 페이지 로드 시 1단계 자동 표시
contentDiv.textContent = diaryContents[1];

</script>

</body>
</html>
