<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>고향</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:serif;
}

h1{
  font-family: monospace;
  margin-bottom:20px;
  font-size:12px;
}

#progress{
  font-family: monospace;
  margin-bottom:20px;
  font-size:10px;
}

#grid{
  display:grid;
  grid-template-columns:repeat(3,250px);
  grid-template-rows:repeat(3,250px);
  gap:15px;
}

img{
  width:250px;
  height:250px;
  object-fit:cover;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>당신의 고향과 가장 가까운 이미지를 고르시오.</h1>

<div id="progress">0 / 5</div>   <!-- 🔥 이 줄 추가 -->

<div id="grid"></div>

<script type="module" src="script.js"></script>

</body>
</html>
