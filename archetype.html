<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Layered Collective Archetypes</title>
<style>
  body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    width:90%;
    margin:auto;
  }
  canvas{
    background:black;
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Non-Overlapping Variations</h2>

<div class="grid">
  <canvas id="c0" width="500" height="300"></canvas>
  <canvas id="c1" width="500" height="300"></canvas>
  <canvas id="c2" width="500" height="300"></canvas>
  <canvas id="c3" width="500" height="300"></canvas>
  <canvas id="c4" width="500" height="300"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function generate(){

  const snapshot = await getDocs(collection(db,"results"));

  const counts = {};
  snapshot.forEach(doc=>{
    doc.data().selections.forEach(img=>{
      counts[img]=(counts[img]||0)+1;
    });
  });

  let sorted = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1]);

  if(sorted.length===0) return;

  const imageMap = {};
  for(let entry of sorted){
    imageMap[entry[0]] = await loadImage(entry[0]);
  }

  // 🔥 사용된 이미지 기록
  const usedImages = new Set();

  for(let v=0; v<5; v++){

    const ctx = document.getElementById("c"+v).getContext("2d");
    ctx.clearRect(0,0,500,300);

    const groups = [
      sorted.slice(0,5),
      sorted.slice(5,10),
      sorted.slice(10,30),
      sorted.slice(30)
    ];

    const opacities=[0.9,0.6,0.35,0.2];

    groups.forEach((group,i)=>{

      // 아직 안 쓰인 이미지들만 필터
      const available = group.filter(e=>!usedImages.has(e[0]));
      if(available.length===0) return;

      const randomItem = available[Math.floor(Math.random()*available.length)];
      const img = imageMap[randomItem[0]];

      ctx.globalAlpha = opacities[i];
      ctx.drawImage(img,0,0,500,300);

      usedImages.add(randomItem[0]); // 🔥 사용 처리
    });

    ctx.globalAlpha=1;
  }
}

function loadImage(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.src=src;
    img.onload=()=>resolve(img);
  });
}

generate();

</script>
</body>
</html>
