<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
    margin: 0;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Majority Vote</h2>
<canvas id="canvas" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

// 연산용 작은 캔버스 (속도 최적화)
const SCALE = 0.25;
const SMALL_W = WIDTH * SCALE;
const SMALL_H = HEIGHT * SCALE;

const offCanvas = document.createElement("canvas");
offCanvas.width = SMALL_W;
offCanvas.height = SMALL_H;
const offCtx = offCanvas.getContext("2d");

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length === 0) {
    ctx.fillStyle = "white";
    ctx.fillText("No data yet", WIDTH/2 - 40, HEIGHT/2);
    return;
  }

  const imagePool = sorted.map(e => e[0]);

  const loaded = await Promise.all(
    imagePool.map(src => loadImage(src))
  );

  buildMajorityImage(loaded);
}

function buildMajorityImage(images) {

  const imageDataArray = [];

  images.forEach(img => {
    offCtx.clearRect(0,0,SMALL_W,SMALL_H);
    offCtx.drawImage(img, 0, 0, SMALL_W, SMALL_H);
    imageDataArray.push(
      offCtx.getImageData(0,0,SMALL_W,SMALL_H).data
    );
  });

  const finalImage = offCtx.createImageData(SMALL_W, SMALL_H);
  const totalPixels = SMALL_W * SMALL_H;

  for (let i = 0; i < totalPixels; i++) {

    const index = i * 4;

    const colorVotes = {};

    imageDataArray.forEach(data => {
      const r = data[index];
      const g = data[index+1];
      const b = data[index+2];

      // 색상 단순화 (정확히 일치해야 하므로 약간 양자화)
      const key =
        Math.round(r/32)*32 + "," +
        Math.round(g/32)*32 + "," +
        Math.round(b/32)*32;

      colorVotes[key] = (colorVotes[key] || 0) + 1;
    });

    let winningColor = null;
    let maxVotes = 0;

    for (let color in colorVotes) {
      if (colorVotes[color] > maxVotes) {
        maxVotes = colorVotes[color];
        winningColor = color;
      }
    }

    const [wr, wg, wb] = winningColor.split(",").map(Number);

    finalImage.data[index] = wr;
    finalImage.data[index+1] = wg;
    finalImage.data[index+2] = wb;
    finalImage.data[index+3] = 255;
  }

  offCtx.putImageData(finalImage, 0, 0);

  // 확대해서 메인 캔버스에 그리기
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offCanvas, 0, 0, WIDTH, HEIGHT);
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
