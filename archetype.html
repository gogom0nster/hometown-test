<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
    margin: 0;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Weighted Formation</h2>
<canvas id="canvas" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  let totalVotes = 0;

  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
      totalVotes++;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length === 0) {
    ctx.fillStyle = "white";
    ctx.fillText("No data yet", WIDTH/2 - 40, HEIGHT/2);
    return;
  }

  const loaded = await Promise.all(
    sorted.map(entry => loadImage(entry[0]))
  );

  ctx.clearRect(0,0,WIDTH,HEIGHT);

  // 🔥 적게 고른 이미지부터 먼저 그림 (뒤에 배치)
  for (let i = sorted.length - 1; i >= 0; i--) {

    const voteCount = sorted[i][1];
    const weight = voteCount / totalVotes; // 선택 비율

    const img = loaded[i];

    // 비중에 따른 크기 (70% ~ 100%)
    const scale = 0.7 + weight * 0.6;

    const drawWidth = WIDTH * scale;
    const drawHeight = HEIGHT * scale;

    const offsetX = (WIDTH - drawWidth) / 2;
    const offsetY = (HEIGHT - drawHeight) / 2;

    // 비중에 따른 투명도
    ctx.globalAlpha = 0.15 + weight * 1.5;

    // 많이 고른 이미지는 선명
    const blurAmount = 6 - weight * 20;
    ctx.filter = `blur(${Math.max(0, blurAmount)}px)`;

    ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
  }

  ctx.globalAlpha = 1;
  ctx.filter = "none";
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
