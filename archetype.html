<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
    margin: 0;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형</h2>
<canvas id="canvas" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "여기에_apiKey",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  let total = 0;

  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
      total++;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length === 0) {
    ctx.fillStyle = "white";
    ctx.fillText("No data yet", WIDTH/2 - 40, HEIGHT/2);
    return;
  }

  const topImages = sorted.map(e => e[0]);

  const loaded = await Promise.all(
    topImages.map(src => loadImage(src))
  );

  ctx.clearRect(0,0,WIDTH,HEIGHT);

  // 🌫 배경 아주 약한 잔향 (6위 이후)
  for (let i = 5; i < Math.min(15, loaded.length); i++) {
    ctx.globalAlpha = 0.04;
    ctx.filter = "blur(12px)";
    ctx.drawImage(loaded[i], 0, 0, WIDTH, HEIGHT);
  }

  // 🫧 2~5위 (주변 기억)
  for (let i = 1; i < Math.min(5, loaded.length); i++) {
    ctx.globalAlpha = 0.18;
    ctx.filter = "blur(6px)";
    ctx.drawImage(loaded[i], 0, 0, WIDTH, HEIGHT);
  }

  // 🔥 1위 (Core) – 점점 선명해지게
  ctx.globalAlpha = 0;
  ctx.filter = "blur(20px)";

  let opacity = 0;
  let blur = 20;

  function animateCore() {

    ctx.clearRect(0,0,WIDTH,HEIGHT);

    // 다시 배경 레이어 그림
    for (let i = 5; i < Math.min(15, loaded.length); i++) {
      ctx.globalAlpha = 0.04;
      ctx.filter = "blur(12px)";
      ctx.drawImage(loaded[i], 0, 0, WIDTH, HEIGHT);
    }

    for (let i = 1; i < Math.min(5, loaded.length); i++) {
      ctx.globalAlpha = 0.18;
      ctx.filter = "blur(6px)";
      ctx.drawImage(loaded[i], 0, 0, WIDTH, HEIGHT);
    }

    // Core 애니메이션
    ctx.globalAlpha = opacity;
    ctx.filter = `blur(${blur}px)`;
    ctx.drawImage(loaded[0], 0, 0, WIDTH, HEIGHT);

    if (opacity < 1) {
      opacity += 0.01;
      blur -= 0.2;
      requestAnimationFrame(animateCore);
    } else {
      ctx.globalAlpha = 1;
      ctx.filter = "blur(2px)"; // 완전 또렷하지 않게 약간 남김
      ctx.drawImage(loaded[0], 0, 0, WIDTH, HEIGHT);
      ctx.filter = "none";
    }
  }

  animateCore();
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
