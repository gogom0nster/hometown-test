<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
    margin: 0;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Fragment Reconstruction</h2>
<canvas id="canvas" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "여기에_apiKey",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length === 0) {
    ctx.fillStyle = "white";
    ctx.fillText("No data yet", WIDTH/2 - 40, HEIGHT/2);
    return;
  }

  const imagePool = sorted.map(e => e[0]);

  const loaded = await Promise.all(
    imagePool.map(src => loadImage(src))
  );

  ctx.clearRect(0,0,WIDTH,HEIGHT);

  buildFragmentMosaic(loaded);
}

function buildFragmentMosaic(images) {

  const gridSize = 20 + Math.random() * 60; // 블록 크기
  const cols = Math.ceil(WIDTH / gridSize);
  const rows = Math.ceil(HEIGHT / gridSize);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {

      const img = weightedPick(images);

      const sx = Math.random() * img.width;
      const sy = Math.random() * img.height;

      ctx.drawImage(
        img,
        sx, sy,
        gridSize, gridSize,
        x * gridSize,
        y * gridSize,
        gridSize,
        gridSize
      );
    }
  }
}

function weightedPick(images) {

  const r = Math.random();

  if (r < 0.6) {
    return images[0]; // 1위 60%
  } else if (r < 0.85 && images[1]) {
    return images[1]; // 2위
  } else if (r < 0.95 && images[2]) {
    return images[2]; // 3위
  } else {
    return images[Math.floor(Math.random() * images.length)];
  }
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
