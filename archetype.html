<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Archetype Viewer</title>
<style>
  body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
  }
  canvas{
    background:black;
    cursor:pointer;
    transition:opacity 0.4s ease;
  }
  p{
    opacity:0.6;
    font-size:14px;
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형</h2>
<p>이미지를 클릭하면 다음 버전으로 넘어갑니다</p>

<canvas id="mainCanvas" width="600" height="360"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("mainCanvas");
const ctx = canvas.getContext("2d");

let generatedVersions = [];
let currentIndex = 0;

async function generate(){

  const snapshot = await getDocs(collection(db,"results"));

  const counts = {};
  snapshot.forEach(doc=>{
    doc.data().selections.forEach(img=>{
      counts[img]=(counts[img]||0)+1;
    });
  });

  let sorted = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1]);

  if(sorted.length===0) return;

  const imageMap = {};
  for(let entry of sorted){
    imageMap[entry[0]] = await loadImage(entry[0]);
  }

  const usedImages = new Set();

  for(let v=0; v<5; v++){

    const offCanvas = document.createElement("canvas");
    offCanvas.width = canvas.width;
    offCanvas.height = canvas.height;
    const offCtx = offCanvas.getContext("2d");

    const groups = [
      sorted.slice(0,5),
      sorted.slice(5,10),
      sorted.slice(10,30),
      sorted.slice(30)
    ];

    const opacities=[0.9,0.6,0.35,0.2];

    groups.forEach((group,i)=>{
      const available = group.filter(e=>!usedImages.has(e[0]));
      if(available.length===0) return;

      const randomItem = available[Math.floor(Math.random()*available.length)];
      const img = imageMap[randomItem[0]];

      offCtx.globalAlpha = opacities[i];
      offCtx.drawImage(img,0,0,canvas.width,canvas.height);

      usedImages.add(randomItem[0]);
    });

    offCtx.globalAlpha=1;
    generatedVersions.push(offCanvas);
  }

  drawCurrent();
}

function drawCurrent(){
  canvas.style.opacity = 0;
  setTimeout(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(generatedVersions[currentIndex],0,0);
    canvas.style.opacity = 1;
  },200);
}

canvas.addEventListener("click",()=>{
  currentIndex = (currentIndex+1)%generatedVersions.length;
  drawCurrent();
});

function loadImage(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.src=src;
    img.onload=()=>resolve(img);
  });
}

generate();

</script>
</body>
</html>
