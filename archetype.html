<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형</h2>
<canvas id="canvas" width="800" height="500"></canvas>
<br><br>
<button onclick="downloadImage()">이미지 저장</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "여기에_네_apiKey",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));
  const counts = {};
  let totalSelections = 0;

  snapshot.forEach(doc => {
    const data = doc.data();
    data.selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
      totalSelections++;
    });
  });

  const images = Object.keys(counts);
  const weights = images.map(img => counts[img] / totalSelections);

  const loadedImages = await Promise.all(images.map(loadImage));

  // ---- 1️⃣ 픽셀 평균 배경 생성 ----
  const offCanvas = document.createElement("canvas");
  offCanvas.width = WIDTH;
  offCanvas.height = HEIGHT;
  const offCtx = offCanvas.getContext("2d");

  const imageDataArray = [];

  loadedImages.forEach(img => {
    offCtx.clearRect(0, 0, WIDTH, HEIGHT);
    offCtx.drawImage(img, 0, 0, WIDTH, HEIGHT);
    imageDataArray.push(offCtx.getImageData(0, 0, WIDTH, HEIGHT));
  });

  const avgImageData = offCtx.createImageData(WIDTH, HEIGHT);

  for (let i = 0; i < avgImageData.data.length; i += 4) {

    let r = 0, g = 0, b = 0;

    imageDataArray.forEach(data => {
      r += data.data[i];
      g += data.data[i+1];
      b += data.data[i+2];
    });

    avgImageData.data[i] = r / imageDataArray.length;
    avgImageData.data[i+1] = g / imageDataArray.length;
    avgImageData.data[i+2] = b / imageDataArray.length;
    avgImageData.data[i+3] = 255;
  }

  ctx.putImageData(avgImageData, 0, 0);

  // ---- 2️⃣ 가중치 레이어 합성 ----
  loadedImages.forEach((img, index) => {
    ctx.globalAlpha = weights[index] * 2; // 가중 강조
    ctx.drawImage(img, 0, 0, WIDTH, HEIGHT);
  });

  ctx.globalAlpha = 1;

  // ---- 3️⃣ 살짝 블러 효과 ----
  ctx.globalCompositeOperation = "overlay";
  ctx.filter = "blur(8px)";
  ctx.drawImage(canvas, 0, 0);
  ctx.filter = "none";
  ctx.globalCompositeOperation = "source-over";
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

window.downloadImage = function() {
  const link = document.createElement("a");
  link.download = "archetype.png";
  link.href = canvas.toDataURL();
  link.click();
}

generateArchetype();

</script>
</body>
</html>
