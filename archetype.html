<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
    margin: 0;
  }
  canvas {
    margin-top: 20px;
    background: #000;
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Weighted Mosaic</h2>
<canvas id="canvas" width="1000" height="600"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  let totalVotes = 0;

  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
      totalVotes++;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length === 0) return;

  const loaded = await Promise.all(
    sorted.map(entry => loadImage(entry[0]))
  );

  ctx.clearRect(0,0,WIDTH,HEIGHT);

  let x = 0;
  let y = 0;
  let rowHeight = 0;

  for (let i = 0; i < sorted.length; i++) {

    const voteCount = sorted[i][1];
    const weight = voteCount / totalVotes;

    const img = loaded[i];

    // 🔥 비중에 따른 크기 (극적 차이)
    const tileWidth = 120 + weight * 600;
    const aspect = img.height / img.width;
    const tileHeight = tileWidth * aspect;

    // 줄바꿈
    if (x + tileWidth > WIDTH) {
      x = 0;
      y += rowHeight + 10;
      rowHeight = 0;
    }

    if (y + tileHeight > HEIGHT) break;

    ctx.drawImage(img, x, y, tileWidth, tileHeight);

    x += tileWidth + 10;
    rowHeight = Math.max(rowHeight, tileHeight);
  }
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
