<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
    margin: 0;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Spatial Distortion</h2>
<canvas id="canvas" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

const SCALE = 0.3;
const SMALL_W = WIDTH * SCALE;
const SMALL_H = HEIGHT * SCALE;

const offCanvas = document.createElement("canvas");
offCanvas.width = SMALL_W;
offCanvas.height = SMALL_H;
const offCtx = offCanvas.getContext("2d");

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  if (sorted.length === 0) {
    ctx.fillStyle = "white";
    ctx.fillText("No data yet", WIDTH/2 - 40, HEIGHT/2);
    return;
  }

  const imagePool = sorted.map(e => e[0]);

  const loaded = await Promise.all(
    imagePool.map(src => loadImage(src))
  );

  buildDistortedAverage(loaded);
}

function buildDistortedAverage(images) {

  const imageDataArray = [];

  images.forEach((img, index) => {

    offCtx.clearRect(0,0,SMALL_W,SMALL_H);

    // 🔥 이미지마다 다른 왜곡값
    const offsetX = (Math.random() - 0.5) * 40;
    const offsetY = (Math.random() - 0.5) * 40;

    offCtx.drawImage(
      img,
      offsetX,
      offsetY,
      SMALL_W,
      SMALL_H
    );

    imageDataArray.push(
      offCtx.getImageData(0,0,SMALL_W,SMALL_H).data
    );
  });

  const finalImage = offCtx.createImageData(SMALL_W, SMALL_H);
  const totalPixels = SMALL_W * SMALL_H;

  for (let i = 0; i < totalPixels; i++) {

    const index = i * 4;

    let r = 0, g = 0, b = 0;

    imageDataArray.forEach(data => {
      r += data[index];
      g += data[index+1];
      b += data[index+2];
    });

    r /= imageDataArray.length;
    g /= imageDataArray.length;
    b /= imageDataArray.length;

    finalImage.data[index] = r;
    finalImage.data[index+1] = g;
    finalImage.data[index+2] = b;
    finalImage.data[index+3] = 255;
  }

  offCtx.putImageData(finalImage, 0, 0);

  ctx.imageSmoothingEnabled = true;
  ctx.filter = "blur(2px)";
  ctx.drawImage(offCanvas, 0, 0, WIDTH, HEIGHT);
  ctx.filter = "none";
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
