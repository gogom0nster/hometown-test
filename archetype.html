<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
  }
  canvas {
    margin-top: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형</h2>
<canvas id="canvas" width="800" height="500"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "여기에_apiKey",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const WIDTH = 800;
const HEIGHT = 500;

async function generateArchetype() {

  const snapshot = await getDocs(collection(db, "results"));

  const counts = {};
  let total = 0;

  snapshot.forEach(doc => {
    doc.data().selections.forEach(img => {
      counts[img] = (counts[img] || 0) + 1;
      total++;
    });
  });

  const entries = Object.entries(counts)
    .sort((a,b) => b[1] - a[1]);

  const images = entries.map(e => e[0]);
  const weights = entries.map(e => e[1] / total);

  const loaded = await Promise.all(images.map(loadImage));

  // 🔹 1️⃣ 저해상도 평균 계산
  const lowW = 200;
  const lowH = 125;

  const lowCanvas = document.createElement("canvas");
  lowCanvas.width = lowW;
  lowCanvas.height = lowH;
  const lowCtx = lowCanvas.getContext("2d");

  const imageDataArray = [];

  loaded.forEach(img => {
    lowCtx.clearRect(0,0,lowW,lowH);
    lowCtx.drawImage(img, 0, 0, lowW, lowH);
    imageDataArray.push(lowCtx.getImageData(0,0,lowW,lowH));
  });

  const avg = lowCtx.createImageData(lowW, lowH);

  for (let i = 0; i < avg.data.length; i += 4) {

    let r=0,g=0,b=0;

    imageDataArray.forEach(data => {
      r += data.data[i];
      g += data.data[i+1];
      b += data.data[i+2];
    });

    avg.data[i] = r / imageDataArray.length;
    avg.data[i+1] = g / imageDataArray.length;
    avg.data[i+2] = b / imageDataArray.length;
    avg.data[i+3] = 255;
  }

  lowCtx.putImageData(avg,0,0);

  // 🔹 2️⃣ 고해상도에 배경 확대
  ctx.drawImage(lowCanvas, 0, 0, WIDTH, HEIGHT);

  // 🔹 3️⃣ 상위 20개만 가중 합성
  const topN = Math.min(20, loaded.length);

  for (let i = 0; i < topN; i++) {
    ctx.globalAlpha = weights[i] * 3;
    ctx.drawImage(loaded[i], 0, 0, WIDTH, HEIGHT);
  }

  ctx.globalAlpha = 1;

  // 🔹 부드러운 블러
  ctx.filter = "blur(6px)";
  ctx.drawImage(canvas, 0, 0);
  ctx.filter = "none";
}

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;
    img.onload = () => resolve(img);
  });
}

generateArchetype();

</script>
</body>
</html>
