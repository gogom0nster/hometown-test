<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Layered Collective Archetypes</title>
<style>
  body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    width:90%;
    margin:auto;
  }
  canvas{
    background:black;
  }
</style>
</head>
<body>

<h2>집단적 고향의 원형 – Layered Variations</h2>

<div class="grid">
  <canvas id="c0" width="500" height="300"></canvas>
  <canvas id="c1" width="500" height="300"></canvas>
  <canvas id="c2" width="500" height="300"></canvas>
  <canvas id="c3" width="500" height="300"></canvas>
  <canvas id="c4" width="500" height="300"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcgpImd4xQQrXjsdeUtISiI0blO6qHNhQ",
  authDomain: "hometown-data.firebaseapp.com",
  projectId: "hometown-data",
  storageBucket: "hometown-data.firebasestorage.app",
  messagingSenderId: "427121820704",
  appId: "1:427121820704:web:ae205795fbcac3e713e845"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function generate(){

  const snapshot = await getDocs(collection(db,"results"));

  const counts = {};
  snapshot.forEach(doc=>{
    doc.data().selections.forEach(img=>{
      counts[img]=(counts[img]||0)+1;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1]);

  if(sorted.length===0) return;

  const images = await Promise.all(
    sorted.map(e=>loadImage(e[0]))
  );

  const groups = [
    sorted.slice(0,5),
    sorted.slice(5,10),
    sorted.slice(10,30),
    sorted.slice(30)
  ];

  for(let v=0; v<5; v++){

    const ctx = document.getElementById("c"+v).getContext("2d");
    ctx.clearRect(0,0,500,300);
    ctx.globalCompositeOperation="source-over";

    groups.forEach((group,i)=>{

      if(group.length===0) return;

      const randomItem = group[Math.floor(Math.random()*group.length)];
      const index = sorted.findIndex(e=>e[0]===randomItem[0]);
      const img = images[index];

      const opacities=[0.9,0.6,0.35,0.2];

      ctx.globalAlpha=opacities[i] || 0.15;

      ctx.drawImage(img,0,0,500,300);
    });

    ctx.globalAlpha=1;
  }
}

function loadImage(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.src=src;
    img.onload=()=>resolve(img);
  });
}

generate();

</script>
</body>
</html>
