<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>고향</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  background:#fff;
}
#randomImage{
  max-width:60%;
  max-height:60%;
  object-fit:contain;
}
</style>
</head>
<body onclick="startSelection()">

<img id="randomImage">

<script>
const URBAN_COUNT = 26;
const NATURAL_COUNT = 36;

function startSelection(){
  window.location.href="selection.html";
}

window.onload=()=>{
  const isUrban = Math.random()>0.5;
  const max = isUrban?URBAN_COUNT:NATURAL_COUNT;
  const rand = Math.floor(Math.random()*max)+1;

  const folder = isUrban?"urban":"natural";
  document.getElementById("randomImage").src =
    `./${folder}/img${rand}.png`;
};
</script>

</body>
</html>
