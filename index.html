    width: max-content; /* grid 폭만큼 중앙정렬 */
  }
</style>
  <meta charset="UTF-8">
  <title>당신의 고향을 선택하시오</title>
</head>

<body>

  <div id="grid"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
