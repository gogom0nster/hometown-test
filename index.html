<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collective Hometown Archetype</title>
<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #111 0%, #222 100%);
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(255,255,255,0.3);
}

p {
  font-size: 1.2rem;
  margin-bottom: 40px;
  opacity: 0.7;
}

button {
  font-size: 1.2rem;
  padding: 15px 35px;
  border: none;
  border-radius: 10px;
  background: #ffcc33;
  color: #111;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ffcc33;
}
</style>
</head>
<body>

<h1>Collective Hometown Archetype</h1>
<p>당신이 기억하는 고향을 선택하여, 집단적 고향의 원형을 발견해보세요.</p>
<button onclick="startSelection()">고향 선택 시작</button>

<script>
function startSelection(){
  window.location.href = "selection.html";
}
</script>

</body>
</html>
