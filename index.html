<!DOCTYPE html>
<html>
<head>
  <style>
  #grid {
    display: grid;
    grid-template-columns: repeat(3, 150px);
    grid-template-rows: repeat(3, 150px);
    gap: 5px;
    margin: 20px auto;
    width: max-content; /* grid 폭만큼 중앙정렬 */
  }
</style>
  <meta charset="UTF-8">
  <title>당신의 고향을 선택하시오</title>
</head>

<body>
  <h1>당신의 고향과 가장 가까운 이미지를 고르시오.</h1>
  <div id="progress"></div>
  <div id="grid"></div>

  <script type="module" src="script.js"></script>
  <div id="memoryOverlay" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
">
  <div id="memoryButton" style="
    font-size: 60px;
    color: white;
    cursor: pointer;
    letter-spacing: 8px;
    transition: 0.3s;
  ">
    memory
  </div>
</div>
</body>
</html>
